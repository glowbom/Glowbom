<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Waveform Visualizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #f4f4f5;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .bg-grid {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8 antialiased selection:bg-cyan-500/30">

    <main class="w-full max-w-5xl bg-zinc-900 rounded-3xl border border-zinc-800 shadow-2xl overflow-hidden flex flex-col relative">
        
        <header class="px-6 py-4 border-b border-zinc-800/80 flex items-center justify-between bg-zinc-900/50 backdrop-blur-sm z-10">
            <div class="flex items-center gap-3">
                <div class="relative flex items-center justify-center w-6 h-6">
                    <div id="status-ping" class="absolute w-3 h-3 bg-red-500 rounded-full opacity-0"></div>
                    <div id="status-dot" class="relative w-2 h-2 bg-zinc-600 rounded-full transition-colors duration-300"></div>
                </div>
                <h1 class="text-sm font-medium tracking-wide text-zinc-300 uppercase">Studio Capture</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="time-display" class="font-mono text-lg font-medium text-zinc-400 tabular-nums tracking-tight">00:00.00</div>
                <img id="user-avatar" src="about:blank" alt="User Profile" class="w-8 h-8 rounded-full ring-2 ring-zinc-800 object-cover">
            </div>
        </header>

        <section class="relative w-full h-[400px] bg-zinc-950 bg-grid overflow-hidden">
            <div class="absolute top-1/2 left-0 w-full h-px bg-zinc-800/80 -translate-y-1/2 pointer-events-none z-0"></div>
            
            <canvas id="waveform-canvas" class="w-full h-full block relative z-10"></canvas>
            
            <div class="absolute inset-y-0 left-0 w-24 bg-gradient-to-r from-zinc-950 to-transparent pointer-events-none z-20"></div>
            <div class="absolute inset-y-0 right-0 w-24 bg-gradient-to-l from-zinc-950 to-transparent pointer-events-none z-20"></div>

            <div class="absolute top-0 right-[20%] w-[2px] h-full bg-cyan-500/50 shadow-[0_0_15px_rgba(6,182,212,0.6)] pointer-events-none z-30 transform -translate-x-1/2">
                <div class="absolute top-0 left-1/2 w-3 h-3 border-[2px] border-cyan-500 bg-zinc-950 rounded-full -translate-x-1/2 -translate-y-1/2"></div>
                <div class="absolute bottom-0 left-1/2 w-3 h-3 border-[2px] border-cyan-500 bg-zinc-950 rounded-full -translate-x-1/2 translate-y-1/2"></div>
            </div>
        </section>

        <footer class="px-8 py-8 bg-zinc-900 border-t border-zinc-800 flex items-center justify-center gap-12 no-select">
            
            <button id="btn-reset" class="group p-4 rounded-full text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-zinc-700">
                <svg class="w-6 h-6 transform group-hover:-rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>

            <button id="btn-record" class="relative group flex items-center justify-center w-24 h-24 focus:outline-none">
                <div class="absolute inset-0 rounded-full border-4 border-zinc-700 group-hover:border-zinc-600 transition-colors duration-300"></div>
                <div id="record-icon" class="w-14 h-14 bg-red-500 rounded-full shadow-[0_0_20px_rgba(239,68,68,0.4)] transition-all duration-300 ease-in-out group-hover:scale-105 group-active:scale-95"></div>
            </button>

            <button id="btn-save" class="group p-4 rounded-full text-zinc-500 hover:text-zinc-200 hover:bg-zinc-800 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-zinc-700">
                <svg class="w-6 h-6 transform group-hover:-translate-y-1 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
            </button>

        </footer>
    </main>

    <script>
        const imgAvatar = 'assets/img_abstract_geometric_avatar_modern_min_d08e95a0.png';
        document.getElementById('user-avatar').src = imgAvatar;

        let isRecording = false;
        let recordingTimeMs = 0;
        let audioData = [];
        
        let timeOffset = 0;
        
        const canvas = document.getElementById('waveform-canvas');
        
        const ctx = canvas.getContext('2d', { alpha: false });
        
        const SPACING = 3;
        const SCROLL_SPEED = 150;
        const PLAYHEAD_OFFSET_PCT = 0.8;
        
        let width = 0;
        let height = 0;
        let playheadX = 0;
        let maxVisiblePoints = 0;

        const btnRecord = document.getElementById('btn-record');
        const recordIcon = document.getElementById('btn-record').querySelector('#record-icon');
        const btnReset = document.getElementById('btn-reset');
        const timeDisplay = document.getElementById('time-display');
        const statusDot = document.getElementById('status-dot');
        const statusPing = document.getElementById('status-ping');

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            
            const dpr = window.devicePixelRatio || 1;
            
            width = rect.width;
            height = rect.height;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.scale(dpr, dpr);
            
            playheadX = width * PLAYHEAD_OFFSET_PCT;
            
            maxVisiblePoints = Math.ceil(width / SPACING) + 10;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function generateSimulatedAudioValue(t) {
            const slowOsc = Math.sin(t * 0.5) * 0.5 + 0.5;
            const envelope = Math.pow(slowOsc, 3);
            
            const noise1 = Math.sin(t * 15);
            const noise2 = Math.sin(t * 27) * 0.5;
            const randomScratch = (Math.random() * 2 - 1) * 0.3;
            
            const rawSound = noise1 + noise2 + randomScratch;
            
            let amplitude = (rawSound * envelope * 0.8) + ((Math.random() - 0.5) * 0.05);
            
            return Math.max(-1, Math.min(1, amplitude));
        }

        let lastTimestamp = 0;
        let pixelAccumulator = 0;

        function render(timestamp) {
            if (!lastTimestamp) {
                lastTimestamp = timestamp;
            }
            
            const deltaTime = (timestamp - lastTimestamp) / 1000;
            lastTimestamp = timestamp;

            if (isRecording) {
                recordingTimeMs += deltaTime * 1000;
                updateTimeDisplay();
                
                const pixelsToMove = SCROLL_SPEED * deltaTime;
                pixelAccumulator += pixelsToMove;
                
                while (pixelAccumulator >= SPACING) {
                    audioData.push(generateSimulatedAudioValue(timeOffset));
                    
                    timeOffset += 0.05;
                    pixelAccumulator -= SPACING;
                    
                    if (audioData.length > maxVisiblePoints) {
                        audioData.shift();
                    }
                }
            }

            ctx.fillStyle = '#09090b';
            ctx.fillRect(0, 0, width, height);

            if (audioData.length > 0) {
                ctx.save();
                
                ctx.translate(playheadX, height / 2);
                
                ctx.translate(-pixelAccumulator, 0);

                ctx.beginPath();
                
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                
                const gradient = ctx.createLinearGradient(0, -height/2, 0, height/2);
                gradient.addColorStop(0, 'rgba(6, 182, 212, 0.1)');
                gradient.addColorStop(0.3, 'rgba(6, 182, 212, 1)');
                gradient.addColorStop(0.5, 'rgba(59, 130, 246, 1)');
                gradient.addColorStop(0.7, 'rgba(6, 182, 212, 1)');
                gradient.addColorStop(1, 'rgba(6, 182, 212, 0.1)');
                
                ctx.strokeStyle = gradient;

                for (let i = 0; i < audioData.length; i++) {
                    const dataIndex = audioData.length - 1 - i;
                    const xPos = -(i * SPACING);
                    
                    const normalizedAmp = audioData[dataIndex];
                    
                    const ampHeight = normalizedAmp * (height / 2) * 0.85;

                    if (Math.abs(ampHeight) > 0.5) {
                         ctx.moveTo(xPos, -ampHeight);
                         ctx.lineTo(xPos, ampHeight);
                    } else {
                         ctx.moveTo(xPos, -0.5);
                         ctx.lineTo(xPos, 0.5);
                    }
                }
                
                ctx.stroke();
                ctx.restore();
            }

            requestAnimationFrame(render);
        }

        requestAnimationFrame(render);

        function formatTime(ms) {
            const totalSeconds = Math.floor(ms / 1000);
            const minutes = Math.floor(totalSeconds / 60);
            const seconds = totalSeconds % 60;
            const centiseconds = Math.floor((ms % 1000) / 10);
            
            return `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${centiseconds.toString().padStart(2, '0')}`;
        }

        function updateTimeDisplay() {
            timeDisplay.textContent = formatTime(recordingTimeMs);
        }

        function resetState() {
            if (isRecording) {
                toggleRecording();
            }
            audioData = [];
            recordingTimeMs = 0;
            timeOffset = 0;
            pixelAccumulator = 0;
            updateTimeDisplay();
        }

        function toggleRecording() {
            isRecording = !isRecording;
            
            if (isRecording) {
                recordIcon.classList.remove('rounded-full', 'w-14', 'h-14');
                recordIcon.classList.add('rounded-lg', 'w-8', 'h-8');
                
                statusDot.classList.replace('bg-zinc-600', 'bg-red-500');
                statusPing.classList.add('animate-ping', 'opacity-75');
            } else {
                recordIcon.classList.remove('rounded-lg', 'w-8', 'h-8');
                recordIcon.classList.add('rounded-full', 'w-14', 'h-14');
                
                statusDot.classList.replace('bg-red-500', 'bg-zinc-600');
                statusPing.classList.remove('animate-ping', 'opacity-75');
            }
        }

        btnRecord.addEventListener('click', toggleRecording);
        btnReset.addEventListener('click', resetState);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                toggleRecording();
            }
        });

    </script>
</body>
</html>
